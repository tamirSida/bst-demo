# Netlify configuration for מגדלור (Next.js 16 App Router).
# The official Next.js runtime handles routing, SSR and API routes.

[build]
  command = "npm run build"

[build.environment]
  NODE_VERSION = "22"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# The AI ingest pipeline (~20-40s) exceeds Netlify's synchronous function limit
# (10s free / 26s Pro), so it runs in the background function
# `netlify/functions/ingest-background.mts` (15-min budget). The inbound webhook
# and /api/ingest just enqueue to it and return immediately (see lib/ingest/enqueue.ts).
# REQUIRED env var: INGEST_FUNCTION_SECRET — shared secret authenticating the
# enqueue → background-function call. Set the SAME value here and in .env.local.
[functions]
  node_bundler = "esbuild"
  # Background function imports our server lib; a scoped tsconfig neutralizes the
  # `server-only` guard for that bundle only (netlify/functions/tsconfig.json).
